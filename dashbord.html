<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial;
        }

        body {
            height: 100vh;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        .navbar {
            padding: 15px;
            text-align: center;
            font-size: 20px;
            font-weight: bold;
        }

        .container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 50px;
        }

        .card {
            width: 200px;
            padding: 20px;
            border-radius: 15px;

            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);

            text-align: center;
            cursor: pointer;

            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-10px);
            background: rgba(255,255,255,0.2);
        }

        a {
            text-decoration: none;
            color: white;
        }

        .logout {
            position: absolute;
            top: 20px;
            right: 20px;
            cursor: pointer;
        }
    </style>
</head>

<body>

<div class="navbar">
    Debug Agent Dashboard 🚀
</div>

<div class="logout" onclick="logout()">Logout</div>

<div class="container">

    <a href="editor.html">
        <div class="card">
            <h3>💻 Code Editor</h3>
            <p>Write & Run Code</p>
        </div>
    </a>

    <a href="#">
        <div class="card">
            <h3>📜 History</h3>
            <p>View Past Runs</p>
        </div>
    </a>

    <a href="#">
        <div class="card">
            <h3>⬇ Download</h3>
            <p>Get Report</p>
        </div>
    </a>

</div>

<script>
function logout() {
    alert("Logged out");
    window.location.href = "login.html";
}
</script>

</body>
</html>
